name: Update mostre.json

on:
  # Scheduled trigger disabled after repeated cost issues while debugging —
  # re-enable the `schedule:` block once the script is confirmed reliable
  # and you've decided you want it running unattended.
  # schedule:
  #   - cron: '0 6 * * 5' # Every Friday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/update-mostre.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if mostre.json changed
        run: |
          git config user.name "mostrami-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/mostre.json
          git diff --cached --quiet || git commit -m "Aggiorna mostre.json (agente settimanale)"
          git push
